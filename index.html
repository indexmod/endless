<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>endless</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f10;
      color: white;
    }

    .hint {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 12px;
      opacity: 0.5;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 60px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .post {
      background: #1b1b1e;
      border-radius: 14px;
      overflow: hidden;
      padding: 10px;
    }

    img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    .meta {
      font-size: 11px;
      opacity: 0.4;
      margin-top: 6px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<div class="hint">paste image URL → saved to KV</div>
<div id="feed" class="feed"></div>

<script>
const feed = document.getElementById('feed')

function render(post) {
  const el = document.createElement('div')
  el.className = 'post'

  el.innerHTML = `
    <img src="${post.image}" />
    <div class="meta">${post.id}</div>
  `

  feed.prepend(el)
}

async function load() {
  const res = await fetch('/api/feed')
  const posts = await res.json()
  posts.reverse().forEach(render)
}

async function save(image) {
  await fetch('/api/post', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ image })
  })
}

document.addEventListener('paste', async (e) => {
  const text = (e.clipboardData || window.clipboardData)
    .getData('text')
    .trim()

  if (!/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)/i.test(text)) return

  await save(text)
  render({ image: text, id: 'live' })
})

load()
</script>

</body>
</html>
