const adminHTML = `
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>admin</title>
<style>
body{
  font-family: Helvetica, Arial, sans-serif;
  background:white;
  color:black;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:60px;
}

input, textarea{
  width:600px;
  font-size:16px;
  padding:10px;
  margin:10px;
}

textarea{
  height:120px;
}

button{
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>ADMIN PANEL</h2>

<input id="img" placeholder="image URL"/>

<textarea id="text" maxlength="500">Abracadabra...</textarea>

<div id="counter">0 / 500</div>

<button onclick="send()">Отправить</button>

<script>
const text = document.getElementById('text')
const counter = document.getElementById('counter')

text.addEventListener('input', () => {
  counter.textContent = text.value.length + " / 500"
})

async function send(){
  await fetch('/api/paste',{
    method:'POST',
    headers:{'content-type':'application/json'},
    body: JSON.stringify({
      image: document.getElementById('img').value,
      text: text.value
    })
  })

  alert("saved")
  text.value = "Abracadabra..."
}
</script>

</body>
</html>
`;
