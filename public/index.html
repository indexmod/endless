<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>debug feed</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f10;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 20px;
    }

    input {
      width: 80%;
      max-width: 600px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    img {
      max-width: 80%;
      border-radius: 12px;
      margin-top: 20px;
    }

    .post {
      margin-bottom: 30px;
    }

    .log {
      font-size: 12px;
      opacity: 0.5;
      max-width: 600px;
      word-break: break-all;
    }
  </style>
</head>

<body>

<h3>Image Debug Feed</h3>

<input id="url" placeholder="paste image URL here" />
<button onclick="send()">send</button>

<div class="log" id="log">waiting…</div>

<div id="viewer"></div>

<script>
const input = document.getElementById('url')
const log = document.getElementById('log')
const viewer = document.getElementById('viewer')

async function send() {
  const url = input.value.trim()
  if (!url) return

  log.textContent = "sending: " + url

  await fetch('/api/paste', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ image: url })
  })

  input.value = ""

  load()
}

function render(feed) {
  viewer.innerHTML = ""

  feed.forEach(post => {
    const wrap = document.createElement('div')
    wrap.className = "post"

    const img = document.createElement('img')
    img.src = post.image

    const meta = document.createElement('div')
    meta.className = "log"
    meta.textContent = post.id

    wrap.appendChild(img)
    wrap.appendChild(meta)

    viewer.appendChild(wrap)
  })
}

async function load() {
  const res = await fetch('/api/feed')
  const json = await res.json()

  log.textContent = "posts: " + json.data.length

  render(json.data)
}

load()
setInterval(load, 3000)
</script>

</body>
</html>
