<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>paste feed</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f10;
      color: white;
    }

    .hint {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 12px;
      opacity: 0.5;
      z-index: 10;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 60px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .post {
      background: #1b1b1e;
      border-radius: 14px;
      overflow: hidden;
      padding: 10px;
    }

    .post img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    .meta {
      font-size: 11px;
      opacity: 0.4;
      margin-top: 6px;
      word-break: break-all;
    }

    .empty {
      opacity: 0.3;
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>
<body>

<div class="hint">paste image URL anywhere → new post added</div>

<div id="feed" class="feed">
  <div class="empty" id="empty">waiting for first paste…</div>
</div>

<script>
const feed = document.getElementById('feed')
const empty = document.getElementById('empty')

function isImageUrl(text) {
  return /^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(text.trim())
}

function addPost(url) {
  empty?.remove()

  const post = document.createElement('div')
  post.className = 'post'

  const img = document.createElement('img')
  img.src = url

  const meta = document.createElement('div')
  meta.className = 'meta'
  meta.textContent = url

  post.appendChild(img)
  post.appendChild(meta)

  feed.prepend(post)
}

document.addEventListener('paste', (e) => {
  const text = (e.clipboardData || window.clipboardData)
    .getData('text')
    .trim()

  if (!text) return

  if (isImageUrl(text)) {
    addPost(text)
  }
})
</script>

</body>
</html>
