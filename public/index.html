<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>endless</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #fafafa; }
    .post { padding: 20px; border-bottom: 1px solid #eee; background: white; }
    img { max-width: 100%; display: block; border-radius: 8px; }
    .id { font-size: 11px; opacity: 0.4; margin-top: 6px; }
    .editor {
      margin-top: 10px;
      outline: none;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 6px;
      min-height: 20px;
    }
    #status {
      padding: 10px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div id="status">loading…</div>
<div id="feed"></div>

<script>
const feed = document.getElementById('feed')
const statusEl = document.getElementById('status')

function setStatus(t) {
  statusEl.textContent = t
}

async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    })

    const text = await res.text()

    let data = null
    try {
      data = JSON.parse(text)
    } catch (e) {
      return { ok: false, error: 'Invalid JSON', raw: text }
    }

    return { ok: res.ok, data }
  } catch (e) {
    return { ok: false, error: e.message }
  }
}

async function load() {
  setStatus('loading feed…')

  const res = await safeFetch('/api/feed')

  if (!res.ok) {
    setStatus('feed error: ' + (res.error || 'HTTP error'))
    return
  }

  const posts = res.data

  if (!Array.isArray(posts)) {
    setStatus('feed is not array')
    return
  }

  feed.innerHTML = ''

  if (posts.length === 0) {
    setStatus('no posts yet (press N)')
    return
  }

  posts.forEach(render)

  setStatus('ok')
}

function render(post) {
  const el = document.createElement('div')
  el.className = 'post'

  el.innerHTML = `
    <img src="${post.image}" />
    <div class="id">id: ${post.id}</div>
    <div class="editor" contenteditable data-id="${post.id}">${post.text || ''}</div>
  `

  feed.appendChild(el)
}

let timer

document.addEventListener('input', (e) => {
  if (!e.target.classList.contains('editor')) return

  clearTimeout(timer)

  timer = setTimeout(async () => {
    const id = e.target.dataset.id

    await safeFetch('/api/post/' + id, {
      method: 'PATCH',
      body: JSON.stringify({
        text: e.target.innerText
      })
    })
  }, 400)
})

document.addEventListener('keydown', async (e) => {
  if (e.key !== 'n') return

  const url = prompt('image url')
  if (!url) return

  setStatus('creating post…')

  const res = await safeFetch('/api/post', {
    method: 'POST',
    body: JSON.stringify({ image: url })
  })

  if (!res.ok) {
    setStatus('post failed')
    return
  }

  load()
})

load()
</script>

</body>
</html>
