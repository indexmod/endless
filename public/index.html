<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>kv paste feed</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f10;
      color: white;
    }

    .hint {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 12px;
      opacity: 0.5;
      z-index: 10;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 60px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .post {
      background: #1b1b1e;
      border-radius: 14px;
      overflow: hidden;
      padding: 10px;
    }

    .post img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    .meta {
      font-size: 11px;
      opacity: 0.4;
      margin-top: 6px;
      word-break: break-all;
    }

    .empty {
      opacity: 0.3;
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>

<body>

<div class="hint">paste image URL → saved to KV</div>

<div id="feed" class="feed">
  <div class="empty" id="empty">loading…</div>
</div>

<script>
const feed = document.getElementById('feed')
const empty = document.getElementById('empty')

function render(data) {
  if (!data) return

  const el = document.createElement('div')
  el.className = 'post'

  const img = document.createElement('img')
  img.src = data.image

  const meta = document.createElement('div')
  meta.className = 'meta'
  meta.textContent = JSON.stringify(data, null, 2)

  el.appendChild(img)
  el.appendChild(meta)

  feed.innerHTML = ''
  feed.appendChild(el)

  empty?.remove()
}

async function load() {
  const res = await fetch('/api/feed')
  const json = await res.json()

  render(json.data)
}

async function save(image) {
  await fetch('/api/paste', {
    method: 'POST',
    headers: {
      'content-type': 'application/json'
    },
    body: JSON.stringify({
      image,
      id: Date.now()
    })
  })
}

document.addEventListener('paste', async (e) => {
  const text = (e.clipboardData || window.clipboardData)
    .getData('text')
    .trim()

  if (!text) return

  if (!/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)/i.test(text) &&
      !text.includes('picsum.photos')) return

  await save(text)
  render({ image: text, id: 'live' })
})

load()
setInterval(load, 2000)
</script>

</body>
</html>
